spring.application.name=thais.almeida

server.port=8080

#banco
spring.datasource.url=jdbc:mysql://localhost:3306/pilates
spring.datasource.username=bruno
spring.datasource.password=1305
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update

# Opçőes do ddl-auto:
# create -> recria o banco toda vez
# update -> atualiza sem apagar dados
# validate -> valida estrutura
# none -> năo faz nada

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

jwt.validity=${JWT_VALIDITY:3600}
jwt.secret=${JWT_SECRET:}